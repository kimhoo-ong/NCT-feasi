<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NCT Feasibility — Input Tool</title>
<script src="https://unpkg.com/@azure/msal-browser@3.28.1/lib/msal-browser.min.js"></script>
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F0F2F5;color:#1a1a2e;font-size:14px}
header{background:#0F3460;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
header h1{font-size:15px;font-weight:600}
.hdr-r{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:6px 13px;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.btn.red{background:#E94560}.btn.red:hover{background:#c73450}
.btn.grn{background:#10B981}.btn.grn:hover{background:#059669}
.btn.blue{background:#3b82f6}.btn.blue:hover{background:#2563eb}
.btn.ghost{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3)}.btn.ghost:hover{background:rgba(255,255,255,.25)}

/* Meta */
.meta-wrap{background:#fff;border-bottom:1px solid #ddd}
.meta-toggle{padding:9px 20px;cursor:pointer;font-size:12px;font-weight:600;color:#0F3460;display:flex;align-items:center;gap:6px;user-select:none}
.meta-toggle:hover{background:#f5f7ff}
.meta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px 20px 16px}
@media(max-width:600px){.meta-grid{grid-template-columns:repeat(2,1fr)}}
.mf label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin-bottom:3px}
.mf input,.mf select{width:100%;padding:6px 9px;border:1.5px solid #ddd;border-radius:5px;font-size:12px;outline:none;background:#fff;color:#1a1a2e}
.mf input:focus,.mf select:focus{border-color:#0F3460}

/* Breadcrumb */
.hb{background:#E8F0FE;padding:6px 20px;font-size:11px;color:#0F3460;display:flex;gap:6px;align-items:center;border-bottom:1px solid #c9d7f5;flex-wrap:wrap}
.hb-sep{color:#aaa}

/* Phase tabs */
.phase-tabs{display:flex;border-bottom:2px solid #0F3460;background:#fff;overflow-x:auto}
.ptab{padding:9px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.ptab.active{color:#0F3460;border-bottom-color:#E94560;font-weight:600}
.ptab:hover:not(.active){color:#0F3460;background:#f5f7ff}
.ptab-add{padding:9px 14px;border:none;background:none;cursor:pointer;font-size:20px;color:#0F3460;border-bottom:3px solid transparent;margin-bottom:-2px;line-height:1}
.ptab-add:hover{color:#E94560}
.ptab-total{padding:9px 18px;border:none;background:none;cursor:pointer;font-size:13px;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;border-left:2px solid #e0e0e0;font-weight:500}
.ptab-total.active{color:#0F3460;border-bottom-color:#E94560;font-weight:600}

/* Phase pane */
.pc{display:none;padding:16px;max-width:1600px;margin:0 auto}
.pc.active{display:block}

/* KPI bar */
.kpi-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:600px){.kpi-bar{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:#fff;border-radius:8px;padding:12px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.kpi-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:#aaa;margin-bottom:3px}
.kpi-val{font-size:20px;font-weight:700;color:#0F3460}
.kpi-val.acc{color:#E94560}

/* Sub-phase card */
.sp-card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:14px;overflow:hidden}
.sp-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:#fafbfc;border-bottom:1px solid #eee;gap:8px}
.sp-hdr-l{display:flex;align-items:center;gap:8px}
.sp-badge{font-size:10px;background:#E8F0FE;color:#0F3460;padding:2px 7px;border-radius:4px;font-weight:600;white-space:nowrap}
.sp-name{border:none;outline:none;font-size:13px;font-weight:600;color:#0F3460;background:transparent;min-width:120px;max-width:200px}
.sp-name:focus{border-bottom:1.5px solid #0F3460}
.sp-hdr-r{display:flex;align-items:center;gap:10px}
.sp-kpi{font-size:12px;font-weight:600;color:#0F3460;white-space:nowrap}
.tog{background:#f0f2f5;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:11px;flex-shrink:0;transition:transform .15s}
.tog.coll{transform:rotate(-90deg)}

/* Common cost bar */
.cc-sec{border-bottom:1px solid #eee;background:#fffdf5}
.cc-hdr{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;user-select:none}
.cc-hdr:hover{background:#fff8e8}
.cc-chevron{font-size:10px;color:#aaa;width:14px;display:inline-block}
.cc-body{padding:0 14px 10px}
.cc-tbl{width:100%;border-collapse:collapse;font-size:12px}
.cc-tbl th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#aaa;border-bottom:1px solid #eee;padding:4px 6px}
.cc-tbl td{padding:3px 4px;vertical-align:middle}
.cc-tbl select.inp{width:100%;font-size:11px}

/* Unified matrix */
.matrix-wrap{overflow-x:auto}
.mtx{border-collapse:collapse;font-size:12px;min-width:100%;background:#fff}
.mtx th,.mtx td{border:1px solid #eee;padding:5px 9px;white-space:nowrap;vertical-align:middle}
.mtx thead th{background:#fafbfc;font-size:11px;font-weight:600;color:#555;text-align:center}
.mtx .attr-col{text-align:left;min-width:170px;background:#fafbfc;color:#555;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;border-right:2px solid #e8eaed;position:sticky;left:0;z-index:1}
.mtx .comp-th{background:#fff;min-width:130px;text-align:center}
.mtx .comp-hdr{display:flex;align-items:center;gap:4px;justify-content:center}
.mtx .add-th{background:#fff;text-align:center;min-width:70px}
.mtx .total-th{background:#E8F0FE;color:#0F3460;font-weight:700;min-width:120px;text-align:center;border-left:2px solid #c9d7f5}
.mtx tbody td{text-align:right}
.mtx tbody .attr-col{text-align:left;background:#fafbfc;position:sticky;left:0;z-index:1}

/* Section separators */
.mtx .sec-row td,.mtx .sec-row th{background:#0F3460;color:#fff;padding:4px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;border-color:#0F3460}
.mtx .sec-row.cost td,.mtx .sec-row.cost th{background:#1a1a2e}

/* Cell types */
.mtx td.cpd{background:#fafbff;color:#0F3460;font-weight:600}
.mtx td.tcpd{background:#E8F0FE;color:#0F3460;font-weight:700;border-left:2px solid #c9d7f5}
.mtx .total-row td{background:#E8F0FE;color:#0F3460;font-weight:700;border-top:2px solid #c9d7f5}
.mtx .total-row td.tcpd{border-left:2px solid #c9d7f5}
.mtx td.pbt-cell{background:#f0fff8;color:#059669;font-weight:700}
.mtx td.pbt-total{background:#d4f5e9;color:#059669;font-weight:700;border-left:2px solid #a8e5cc}
.mtx td.mg-cell{background:#fff;color:#555;font-weight:600}
.mtx td.mg-total{background:#E8F0FE;color:#0F3460;font-weight:700;border-left:2px solid #c9d7f5}
.mtx td.gdc-cell{background:#fff8f0;color:#c45;font-weight:600}
.mtx td.gdc-total{background:#fdecea;color:#c45;font-weight:700;border-left:2px solid #f5c6c0}
.mtx td.cc-cell{background:#fffcf0;color:#b45309;font-weight:600}
.mtx td.cc-total{background:#fef3c7;color:#b45309;font-weight:700;border-left:2px solid #fde68a}

/* Pillar rows */
.mtx .pillar-row td{background:#f5f7ff;cursor:pointer}
.mtx .pillar-row td:first-child{font-weight:700;color:#0F3460;font-size:11px;padding-left:6px}
.mtx .pillar-row:hover td{background:#e8f0fe}
.mtx .pillar-row td.tcpd{background:#E8F0FE}
.mtx .item-row{display:none}
.mtx .item-row.open{display:table-row}
.mtx .item-row td.attr-col{padding-left:18px;font-weight:400;color:#555;font-size:11px;text-transform:none;letter-spacing:0}
.mtx .item-row td{background:#fff}
.mtx .item-add-row{display:none}
.mtx .item-add-row.open{display:table-row}
.mtx .item-add-row td{background:#fafbfc;border-top:1px dashed #ccc}
.mtx .item-row.cc-row td.attr-col{color:#b45309;font-style:italic}
.mtx .item-row.cc-row td:not(.attr-col):not(.add-spacer){color:#b45309;font-style:italic;background:#fffdf5}

/* Inputs */
.inp{padding:4px 7px;border:1.5px solid #ddd;border-radius:4px;font-size:12px;outline:none;background:#fff;color:#1a1a2e;width:100%}
.inp:focus{border-color:#0F3460}
.inp.r{text-align:right}
.inp.mono{font-family:monospace;font-size:11px}
select.inp{cursor:pointer;padding:3px 5px}
.rm-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:3px;line-height:1}
.rm-btn:hover{color:#E94560;background:#fee}
.add-btn{display:inline-flex;align-items:center;gap:4px;margin:8px 10px;padding:5px 13px;background:#f0f2f5;border:1.5px dashed #bbb;border-radius:6px;cursor:pointer;font-size:12px;color:#555;font-weight:500}
.add-btn:hover{background:#E8F0FE;border-color:#0F3460;color:#0F3460}
.add-btn-sm{padding:3px 9px;background:#f0f2f5;border:1.5px dashed #bbb;border-radius:5px;cursor:pointer;font-size:11px;color:#555;font-weight:500;white-space:nowrap}
.add-btn-sm:hover{background:#E8F0FE;border-color:#0F3460;color:#0F3460}
.num{font-variant-numeric:tabular-nums}

/* Load modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:10px;width:560px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-hdr{padding:14px 18px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.modal-hdr h3{font-size:14px;font-weight:600;color:#0F3460}
.modal-list{flex:1;overflow-y:auto;padding:8px 0}
.modal-row{padding:10px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid #f0f0f0}
.modal-row:hover{background:#f5f7ff}
.modal-row:last-child{border-bottom:none}
.modal-name{font-size:13px;font-weight:600;color:#1a1a2e;flex:1}
.modal-stage{font-size:11px;background:#E8F0FE;color:#0F3460;padding:2px 8px;border-radius:4px;font-weight:600}
.modal-date{font-size:11px;color:#aaa;white-space:nowrap}
.modal-empty{padding:32px;text-align:center;color:#aaa;font-size:13px}
.modal-footer{padding:10px 18px;border-top:1px solid #eee;display:flex;justify-content:flex-end}
</style>
</head>
<body>

<header>
  <h1>NCT Feasibility · Input Tool</h1>
  <div class="hdr-r">
    <a href="GUIDE.html" target="_blank" class="btn ghost" style="text-decoration:none">? Help</a>
    <span id="user-label" style="font-size:11px;color:rgba(255,255,255,.6);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <button id="logout-btn" class="btn ghost" onclick="signOut()" style="display:none">Sign Out</button>
    <button id="login-btn" class="btn ghost" onclick="signIn()" style="display:none">🔑 Sign In</button>
    <button class="btn ghost" onclick="openLoad()">⬆ Load</button>
    <button class="btn ghost" onclick="saveSnapshot()">💾 Save</button>
    <button class="btn red" onclick="downloadReport()">⬇ Report</button>
    <button class="btn grn" onclick="downloadPipeline()">⬇ Pipeline</button>
  </div>
</header>

<div class="meta-wrap">
  <div class="meta-toggle" onclick="toggleMeta()"><span id="ma">▶</span> Project Details (L1 – L3)</div>
  <div id="meta-body" style="display:none">
    <div class="meta-grid">
      <div class="mf"><label>L1 Company</label><input id="m-co" placeholder="e.g. NCT Group" value="NCT Group"></div>
      <div class="mf"><label>L2 Plot Code</label><input id="m-plot" placeholder="e.g. PLT-SHA-01"></div>
      <div class="mf"><label>L2 Plot Name / Location</label><input id="m-loc" placeholder="e.g. Shah Alam, Selangor"></div>
      <div class="mf"><label>Project Code</label><input id="m-code" placeholder="e.g. NCT-P001"></div>
      <div class="mf"><label>Project Name</label><input id="m-name" placeholder="e.g. Residensi Aman"></div>
      <div class="mf"><label>Stage</label>
        <select id="m-stage">
          <option value="BD">BD — Business Development</option>
          <option value="R1">R1 — Revision 1</option>
          <option value="R2">R2 — Revision 2</option>
          <option value="R3">R3 — Revision 3</option>
        </select>
      </div>
      <div class="mf"><label>Scenario</label><select id="m-scen"><option>Base</option><option>Optimistic</option><option>Stress</option></select></div>
      <div class="mf"><label>Status</label><select id="m-stat"><option>Draft</option><option>Approved</option><option>Archived</option></select></div>
      <div class="mf"><label>Version Date</label><input id="m-date" type="date" value="2026-06-23"></div>
      <div class="mf"><label>WACC (%)</label><input id="m-wacc" type="number" value="8.0" step="0.1"></div>
    </div>
  </div>
</div>

<div class="hb">
  <span id="hb-l1">L1: —</span><span class="hb-sep">›</span>
  <span id="hb-l2">L2: —</span><span class="hb-sep">›</span>
  <span id="hb-l3">L3: Phase</span>
  <span class="hb-sep">›</span><span style="color:#aaa">L4: Sub-phase › L5: Component</span>
</div>

<div class="phase-tabs" id="phase-tabs"></div>
<div id="phase-contents"></div>

<!-- Load modal -->
<div class="modal-bg" id="load-modal">
  <div class="modal">
    <div class="modal-hdr">
      <h3>Load Feasibility</h3>
      <button class="rm-btn" style="font-size:18px" onclick="closeLoad()">✕</button>
    </div>
    <div class="modal-list" id="modal-list"></div>
    <div class="modal-footer">
      <button class="btn ghost" style="background:#f0f2f5;color:#555;border:1.5px solid #ddd" onclick="closeLoad()">Cancel</button>
    </div>
  </div>
</div>

<script>
const R=n=>(isNaN(n)||!isFinite(n))?0:n;
const fmt=n=>'RM '+R(Math.round(n)).toLocaleString();
const fmtM=n=>'RM '+(R(n)/1e6).toFixed(2)+'M';
const fmtAmt=n=>n?fmt(n):'—';
const fmtPsf=(n,nfa)=>nfa>0?R(n/nfa).toFixed(1):'—';
const fmtPct=(n,gdv)=>gdv>0?(R(n/gdv)*100).toFixed(2)+'%':'—';

let phases=[];let spCount={};let compCount={};
let computedSP={};let computedP={};
let currentTab=0;

const PILLARS=[
  {code:'P1',name:'Land Cost',     prefix:'L',items:[['L.PURCHASE','1.1','Land Purchase'],['L.STAMP','1.2','Stamp Duty'],['L.LEGAL','1.3','Legal Fees'],['L.CONV','1.4','Land Conversion Premium'],['L.HOLD','1.5','Holding Cost']]},
  {code:'P2',name:'Construction',  prefix:'C',items:[['C.PILE','2.1','Piling Works'],['C.SUB','2.2','Substructure'],['C.SUPER_CS','2.3','Superstructure (C&S)'],['C.ARCH','2.4','Architectural Finishes'],['C.MEP_MECH','2.5','M&E — Mechanical'],['C.MEP_ELEC','2.6','M&E — Electrical'],['C.PLUMB','2.7','Plumbing & Sanitary'],['C.CONT','2.8','Contingency']]},
  {code:'P3',name:'Infrastructure', prefix:'I',items:[['I.ROAD_INT','3.1','Internal Road Works'],['I.DRAIN','3.2','Drainage'],['I.TNB','3.3','TNB Substation'],['I.WATER','3.4','Water Reticulation'],['I.SEWER','3.5','Sewerage (IWK)'],['I.DEVCON','3.6','Development Contribution']]},
  {code:'P4',name:'Professional Fees',prefix:'P',items:[['P.ARCH','4.1','Architect Fee'],['P.STRUCT','4.2','Structural Engineer'],['P.MEP','4.3','M&E Engineer'],['P.QS','4.4','Quantity Surveyor'],['P.SURVEY','4.5','Licensed Surveyor'],['P.LEGAL','4.6','Legal (End-Financier)']]},
  {code:'P5',name:'Finance, Sales & Mkt',prefix:'F',items:[['F.IDC','5.1','Interest During Construction'],['F.LOANFEE','5.2','Loan Arrangement Fee'],['F.GALLERY','5.3','Sales Gallery Setup'],['F.MKT','5.4','Marketing & Advertising'],['F.AGENT','5.5','Agent Commission'],['F.PM','5.6','Project Management']]},
];

// ─── Phase (L3) ───
function addPhase(name){
  const pIdx=phases.length;
  phases.push({name:name||'Phase '+(pIdx+1)});
  spCount[pIdx]=0;compCount[pIdx]={};computedSP[pIdx]={};
  const div=document.createElement('div');
  div.id='pc-'+pIdx;div.className='pc';
  div.innerHTML=`
    <div class="kpi-bar">
      <div class="kpi-card"><div class="kpi-lbl">Net GDV</div><div class="kpi-val kpi-gdv">—</div></div>
      <div class="kpi-card"><div class="kpi-lbl">GDC</div><div class="kpi-val kpi-gdc">—</div></div>
      <div class="kpi-card"><div class="kpi-lbl">PBT</div><div class="kpi-val kpi-pbt">—</div></div>
      <div class="kpi-card"><div class="kpi-lbl">Margin</div><div class="kpi-val acc kpi-margin">—</div></div>
    </div>
    <div id="sp-list-${pIdx}"></div>
    <button class="add-btn" onclick="addSubphase(${pIdx})">+ Add Sub-phase (L4)</button>`;
  document.getElementById('phase-contents').appendChild(div);
  renderTabs();addSubphase(pIdx,'Sub-phase A');switchTab(pIdx);
}

function switchTab(idx){
  document.querySelectorAll('.pc').forEach(el=>el.classList.remove('active'));
  currentTab=idx;
  if(idx==='total'){document.getElementById('pc-total').classList.add('active');renderTotal();}
  else document.getElementById('pc-'+idx)?.classList.add('active');
  renderTabs();updateBreadcrumb();
}

function renderTabs(){
  let h='';
  phases.forEach((p,i)=>h+=`<button class="ptab${currentTab===i?' active':''}" onclick="switchTab(${i})">${p.name}</button>`);
  h+=`<button class="ptab-add" onclick="promptPhase()">+</button>`;
  h+=`<button class="ptab-total${currentTab==='total'?' active':''}" onclick="switchTab('total')">∑ Total</button>`;
  document.getElementById('phase-tabs').innerHTML=h;
}

function promptPhase(){const n=prompt('Phase name:','Phase '+(phases.length+1));if(n!==null)addPhase(n.trim()||'Phase '+(phases.length+1));}

function updateBreadcrumb(){
  document.getElementById('hb-l1').textContent='L1: '+(document.getElementById('m-co').value||'—');
  document.getElementById('hb-l2').textContent='L2: '+(document.getElementById('m-plot').value||document.getElementById('m-loc').value||'—');
  const pName=typeof currentTab==='number'&&phases[currentTab]?phases[currentTab].name:'Total';
  document.getElementById('hb-l3').textContent='L3: '+pName;
}
document.getElementById('m-co').oninput=updateBreadcrumb;
document.getElementById('m-plot').oninput=updateBreadcrumb;

// ─── Sub-phase (L4) ───
function addSubphase(pIdx,name){
  const spIdx=spCount[pIdx]++;
  const id='sp-'+pIdx+'-'+spIdx;
  compCount[pIdx][spIdx]=0;
  const spName=name||'Sub-phase '+(spIdx+1);

  const html=`
  <div class="sp-card" id="${id}">
    <div class="sp-hdr">
      <div class="sp-hdr-l">
        <span class="sp-badge">L4</span>
        <input class="sp-name" value="${spName}" placeholder="Sub-phase name" oninput="updateBreadcrumb()">
      </div>
      <div class="sp-hdr-r">
        <span class="sp-kpi sp-kpi-${pIdx}-${spIdx}">—</span>
        <button class="rm-btn" onclick="removeSubphase('${id}',${pIdx})" title="Remove">✕</button>
        <button class="tog" id="sptog-${id}" onclick="toggleSP('${id}')">▾</button>
      </div>
    </div>
    <div id="spb-${id}">
      <div class="cc-sec" id="cc-sec-${pIdx}-${spIdx}">
        <div class="cc-hdr" onclick="toggleCC(${pIdx},${spIdx})">
          <span class="cc-chevron" id="cc-chev-${pIdx}-${spIdx}">▶</span>
          <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#888">Common Cost</span>
          <span id="cc-sum-${pIdx}-${spIdx}" style="font-size:12px;color:#b45309;font-weight:700;margin-left:4px">RM 0</span>
          <span style="font-size:11px;color:#aaa;margin-left:6px">↳ auto-allocated to components by NFA ratio</span>
        </div>
        <div class="cc-body" id="cc-body-${pIdx}-${spIdx}" style="display:none">
          <table class="cc-tbl">
            <thead><tr>
              <th style="width:130px">Pillar</th>
              <th style="width:90px">Code</th>
              <th>Description</th>
              <th style="width:130px">Amount (RM)</th>
              <th style="width:28px"></th>
            </tr></thead>
            <tbody id="cc-rows-${pIdx}-${spIdx}"></tbody>
          </table>
          <button class="add-btn" style="margin:6px 14px 4px" onclick="addCCItem(${pIdx},${spIdx})">+ Add Common Cost Item</button>
        </div>
      </div>
      <div class="matrix-wrap">

// ─── Build pillar rows (shared across all components) ───
function buildPillarRows(pIdx,spIdx){
  const tbody=document.getElementById('mtx-body-'+pIdx+'-'+spIdx);
  PILLARS.forEach(p=>{
    // Pillar header row
    const pRow=document.createElement('tr');
    pRow.className='pillar-row';
    pRow.id='prow-'+pIdx+'-'+spIdx+'-'+p.code;
    pRow.dataset.open='1';
    pRow.onclick=()=>togglePillar(pIdx,spIdx,p.code);
    pRow.innerHTML=`<td class="attr-col">▼ ${p.code} — ${p.name}</td><td class="add-spacer"></td><td class="tcpd num">—</td>`;
    tbody.appendChild(pRow);
    // Default item rows — start open
    p.items.forEach(([code,no,desc],iIdx)=>{
      const r=makeItemRow(pIdx,spIdx,p.code,iIdx,code,no,desc);
      r.classList.add('open');
      tbody.appendChild(r);
    });
    // Add-item row — start open
    const addRow=document.createElement('tr');
    addRow.className='item-add-row open';
    addRow.id='iadd-'+pIdx+'-'+spIdx+'-'+p.code;
    addRow.innerHTML=`<td class="attr-col" colspan="20" style="padding:4px 14px">
      <button class="add-btn-sm" onclick="addPillarItem(${pIdx},${spIdx},'${p.code}','${p.prefix}')">+ Add item</button>
    </td>`;
    tbody.appendChild(addRow);
  });

  // GDC total, PBT, Margin rows
  const gdcRow=document.createElement('tr');
  gdcRow.dataset.a='gdc_total';
  gdcRow.className='total-row';
  gdcRow.innerHTML=`<td class="attr-col" style="color:#c45;font-weight:700">Total GDC (RM)</td><td class="add-spacer"></td><td class="gdc-total num">—</td>`;
  tbody.appendChild(gdcRow);

  const pbtRow=document.createElement('tr');
  pbtRow.dataset.a='pbt';
  pbtRow.innerHTML=`<td class="attr-col" style="color:#059669;font-weight:700">PBT (RM)</td><td class="add-spacer"></td><td class="pbt-total num">—</td>`;
  tbody.appendChild(pbtRow);

  const mgRow=document.createElement('tr');
  mgRow.dataset.a='margin';
  mgRow.innerHTML=`<td class="attr-col" style="font-weight:700">Margin</td><td class="add-spacer"></td><td class="mg-total num">—</td>`;
  tbody.appendChild(mgRow);
}

function makeItemRow(pIdx,spIdx,pCode,iIdx,code,no,desc){
  const tr=document.createElement('tr');
  tr.className='item-row';
  tr.id='irow-'+pIdx+'-'+spIdx+'-'+pCode+'-'+iIdx;
  tr.dataset.pillar=pCode;
  tr.dataset.iidx=iIdx;
  tr.innerHTML=`<td class="attr-col">
    <input type="text" class="inp mono i-code" value="${code}" placeholder="CODE" style="width:80px" oninput="csp(${pIdx},${spIdx})">
    <input type="text" class="inp i-desc" value="${desc}" placeholder="Description" style="width:140px;margin-left:4px" oninput="csp(${pIdx},${spIdx})">
  </td><td class="add-spacer"></td><td class="tcpd num i-total">—</td>`;
  return tr;
}

function togglePillar(pIdx,spIdx,pCode){
  const pRow=document.getElementById('prow-'+pIdx+'-'+spIdx+'-'+pCode);
  const isOpen=pRow.dataset.open==='1';
  pRow.dataset.open=isOpen?'0':'1';
  const icon=isOpen?'▶':'▼';
  pRow.querySelector('td.attr-col').textContent=icon+' '+pCode+' — '+PILLARS.find(p=>p.code===pCode).name;
  document.getElementById('mtx-body-'+pIdx+'-'+spIdx).querySelectorAll('.item-row[data-pillar="'+pCode+'"],.item-add-row#iadd-'+pIdx+'-'+spIdx+'-'+pCode)
    .forEach(r=>r.classList.toggle('open',!isOpen));

// ─── Component (L5) ───
function addComponent(pIdx,spIdx){
  const hdrRow=document.getElementById('mtx-hdr-'+pIdx+'-'+spIdx);
  const addTh=document.getElementById('mtx-add-th-'+pIdx+'-'+spIdx);
  const body=document.getElementById('mtx-body-'+pIdx+'-'+spIdx);
  const cIdx=compCount[pIdx][spIdx]++;
  const visIdx=hdrRow.querySelectorAll('.comp-th').length;
  const defName='Component '+(visIdx+1);

  // Header TH
  const th=document.createElement('th');
  th.className='comp-th';th.dataset.cid=cIdx;
  th.innerHTML=`<div class="comp-hdr">
    <input type="text" class="inp c-name" value="${defName}" style="width:90px"
      oninput="syncCompName(${pIdx},${spIdx},${cIdx},this.value);csp(${pIdx},${spIdx})">
    <button class="rm-btn" onclick="removeComponent(${pIdx},${spIdx},${cIdx})">✕</button>
  </div>`;
  hdrRow.insertBefore(th,addTh);

  // Add TD to every data row (skip item rows — handled separately below)
  body.querySelectorAll('tr').forEach(row=>{
    if(row.classList.contains('item-row')||row.classList.contains('item-add-row'))return;
    const a=row.getAttribute('data-a');
    const spacer=row.querySelector('.add-spacer');
    if(!spacer)return;
    const td=document.createElement('td');
    td.dataset.cid=cIdx;
    if(a==='type')
      td.innerHTML=`<select class="inp c-type" onchange="csp(${pIdx},${spIdx})"><option>Residential</option><option>Commercial</option><option>Carpark</option><option>Hotel</option><option>Industrial</option></select>`;
    else if(a==='units')
      td.innerHTML=`<input type="number" class="inp r c-units" placeholder="0" min="0" style="width:75px" oninput="csp(${pIdx},${spIdx})">`;
    else if(a==='nfa_u')
      td.innerHTML=`<input type="number" class="inp r c-nfa" placeholder="sqft" min="0" style="width:75px" oninput="csp(${pIdx},${spIdx})">`;
    else if(a==='asp')
      td.innerHTML=`<input type="number" class="inp r c-asp" placeholder="RM psf" min="0" style="width:75px" oninput="csp(${pIdx},${spIdx})">`;
    else if(a==='bumi_pct')
      td.innerHTML=`<input type="number" class="inp r c-bumi" placeholder="%" min="0" max="100" step="0.1" style="width:65px" oninput="csp(${pIdx},${spIdx})">`;
    else if(a==='subsidy')
      td.innerHTML=`<input type="number" class="inp r c-subsidy" placeholder="RM" min="0" style="width:75px" oninput="csp(${pIdx},${spIdx})">`;
    else if(a==='carpark')
      td.innerHTML=`<input type="number" class="inp r c-carpark" placeholder="RM" min="0" style="width:75px" oninput="csp(${pIdx},${spIdx})">`;
    else if(['tnfa','ggdv','bumi_amt','ngdv'].includes(a)){td.className='cpd num';td.textContent='—';}
    else if(a==='gdc_total'){td.className='gdc-cell num';td.textContent='—';}
    else if(a==='pbt'){td.className='pbt-cell num';td.textContent='—';}
    else if(a==='margin'){td.className='mg-cell num';td.textContent='—';}
    row.insertBefore(td,spacer);
  });

  // Add budget TDs to all item rows for this component (CC rows rebuilt by csp)
  body.querySelectorAll('.item-row').forEach(row=>{
    if(row.classList.contains('cc-row'))return;
    const spacer=row.querySelector('.add-spacer');if(!spacer)return;
    const td=document.createElement('td');
    td.dataset.cid=cIdx;
    td.innerHTML=`<input type="number" class="inp r i-budget" placeholder="0" min="0" style="width:90px" oninput="csp(${pIdx},${spIdx})">`;
    row.insertBefore(td,spacer);
  });

  csp(pIdx,spIdx);
}

  const body=document.getElementById('mtx-body-'+pIdx+'-'+spIdx);

  body.querySelectorAll('td[data-cid="'+cIdx+'"]').forEach(td=>td.remove());

// ─── Rebuild CC display rows in matrix ───
function rebuildCCMatrixRows(pIdx,spIdx){
  const body=document.getElementById('mtx-body-'+pIdx+'-'+spIdx);if(!body)return;
  body.querySelectorAll('.item-row.cc-row').forEach(r=>r.remove());
  const hdrRow=document.getElementById('mtx-hdr-'+pIdx+'-'+spIdx);
  const compThs=Array.from(hdrRow.querySelectorAll('.comp-th'));
  const compNFA={};let totalNFA=0;
  compThs.forEach(th=>{
    const cid=th.dataset.cid;
    const getTd=row=>row?.querySelector('td[data-cid="'+cid+'"]');
    const u=+(getTd(body.querySelector('[data-a="units"]'))?.querySelector('.c-units')?.value)||0;
    const n=+(getTd(body.querySelector('[data-a="nfa_u"]'))?.querySelector('.c-nfa')?.value)||0;
    compNFA[cid]=u*n;totalNFA+=u*n;
  });
  const ccItems=[];
  document.querySelectorAll('#cc-rows-'+pIdx+'-'+spIdx+' tr').forEach(row=>{
    const pillar=row.querySelector('.cc-pillar')?.value||'';
    const code=row.querySelector('.cc-code')?.value||'';
    const desc=row.querySelector('.cc-desc')?.value||'';
    const amt=+row.querySelector('.cc-amt')?.value||0;
    if(pillar)ccItems.push({pillar,code,desc,amt});
  });
  if(!ccItems.length)return;
  PILLARS.forEach(p=>{
    const pillarItems=ccItems.filter(i=>i.pillar===p.code);if(!pillarItems.length)return;
    const addRow=document.getElementById('iadd-'+pIdx+'-'+spIdx+'-'+p.code);
    const pRow=document.getElementById('prow-'+pIdx+'-'+spIdx+'-'+p.code);
    const isOpen=pRow?.dataset.open==='1';
    pillarItems.forEach(item=>{
      const tr=document.createElement('tr');
      tr.className='item-row cc-row'+(isOpen?' open':'');
      tr.dataset.pillar=p.code;
      const label=(item.code?item.code+' ':'')+( item.desc||'Common Cost');
      tr.innerHTML=`<td class="attr-col">↳ ${label}</td><td class="add-spacer"></td><td class="i-total num">—</td>`;
      const spacer=tr.querySelector('.add-spacer');
      compThs.forEach(th=>{
        const cid=th.dataset.cid;
        const alloc=totalNFA>0?item.amt*((compNFA[cid]||0)/totalNFA):0;
        const td=document.createElement('td');
        td.dataset.cid=cid;td.className='num';
        td.textContent=alloc>0?fmt(alloc):'—';
        tr.insertBefore(td,spacer);
      });
      const totalTd=tr.querySelector('.i-total');
      if(totalTd)totalTd.textContent=item.amt>0?fmt(item.amt):'—';
      body.insertBefore(tr,addRow);
    });
  });
}

// ─── Compute sub-phase ───
function csp(pIdx,spIdx){
  const sp=document.getElementById('sp-'+pIdx+'-'+spIdx);if(!sp)return;
  const hdrRow=document.getElementById('mtx-hdr-'+pIdx+'-'+spIdx);
  const body=document.getElementById('mtx-body-'+pIdx+'-'+spIdx);
  rebuildCCMatrixRows(pIdx,spIdx);
  const compThs=Array.from(hdrRow.querySelectorAll('.comp-th'));

  // Common cost total & NFA for allocation
  let ccTotal=0;
  document.querySelectorAll('#cc-rows-'+pIdx+'-'+spIdx+' .cc-amt').forEach(inp=>ccTotal+=+inp.value||0);
  const ccSumEl=document.getElementById('cc-sum-'+pIdx+'-'+spIdx);
  if(ccSumEl)ccSumEl.textContent=ccTotal>0?fmt(ccTotal):'RM 0';

  // First pass: collect NFA per component
  const compNFA={};let totalNFA=0;
  compThs.forEach(th=>{
    const cid=th.dataset.cid;
    const getTd=row=>row.querySelector('td[data-cid="'+cid+'"]');
    const u=+(getTd(body.querySelector('[data-a="units"]'))?.querySelector('.c-units')?.value)||0;
    const n=+(getTd(body.querySelector('[data-a="nfa_u"]'))?.querySelector('.c-nfa')?.value)||0;
    compNFA[cid]=u*n;totalNFA+=u*n;
  });

  let totalGGDV=0,totalBumiAmt=0,totalSubsidy=0,totalCarpark=0,totalNGDV=0;
  let totalGDC=0,totalUnits=0;

  compThs.forEach(th=>{
    const cid=th.dataset.cid;
    const getTd=row=>row.querySelector('td[data-cid="'+cid+'"]');
    const setTd=(attr,cls,val)=>{const td=getTd(body.querySelector('[data-a="'+attr+'"]'));if(td){td.className=cls+' num';td.textContent=val;}};

    const u=+(getTd(body.querySelector('[data-a="units"]'))?.querySelector('.c-units')?.value)||0;
    const n=+(getTd(body.querySelector('[data-a="nfa_u"]'))?.querySelector('.c-nfa')?.value)||0;
    const a=+(getTd(body.querySelector('[data-a="asp"]'))?.querySelector('.c-asp')?.value)||0;
    const bumiPct=(+(getTd(body.querySelector('[data-a="bumi_pct"]'))?.querySelector('.c-bumi')?.value)||0)/100;
    const subsidy=+(getTd(body.querySelector('[data-a="subsidy"]'))?.querySelector('.c-subsidy')?.value)||0;
    const carpark=+(getTd(body.querySelector('[data-a="carpark"]'))?.querySelector('.c-carpark')?.value)||0;

    const tnfa=u*n;
    const ggdv=tnfa*a;
    const bumiAmt=ggdv*bumiPct;
    const ngdv=ggdv-bumiAmt-subsidy+carpark;

    // CC allocation per pillar for this component
    const ccByPillar={};
    document.querySelectorAll('#cc-rows-'+pIdx+'-'+spIdx+' tr').forEach(row=>{
      const pl=row.querySelector('.cc-pillar')?.value||'';
      const amt=+row.querySelector('.cc-amt')?.value||0;
      const alloc=totalNFA>0?amt*(tnfa/totalNFA):0;
      ccByPillar[pl]=(ccByPillar[pl]||0)+alloc;
    });

    setTd('tnfa','cpd',tnfa>0?tnfa.toLocaleString():'—');
    setTd('ggdv','cpd',ggdv>0?fmt(ggdv):'—');
    setTd('bumi_amt','cpd',bumiAmt>0?'('+fmt(bumiAmt)+')':'—');
    setTd('ngdv','cpd',fmt(ngdv));

    // GDC = pillar explicit items + CC allocated to that pillar
    let compGDC=0;
    PILLARS.forEach(p=>{
      let pSub=(ccByPillar[p.code]||0);
      body.querySelectorAll('.item-row[data-pillar="'+p.code+'"]').forEach(row=>{
        const bTd=row.querySelector('td[data-cid="'+cid+'"] .i-budget');
        pSub+=+(bTd?.value)||0;
      });
      compGDC+=pSub;
    });

    // GDC / PBT / Margin per component
    const pbt=ngdv-compGDC;
    const mg=ngdv>0?pbt/ngdv:0;
    const gdcTd=getTd(body.querySelector('[data-a="gdc_total"]'));
    if(gdcTd){gdcTd.className='gdc-cell num';gdcTd.textContent=compGDC>0?fmt(compGDC):'—';}
    const pbtTd=getTd(body.querySelector('[data-a="pbt"]'));
    if(pbtTd){pbtTd.className='pbt-cell num';pbtTd.textContent=fmt(pbt);}
    const mgTd=getTd(body.querySelector('[data-a="margin"]'));
    if(mgTd){mgTd.className='mg-cell num';mgTd.textContent=ngdv>0?(mg*100).toFixed(1)+'%':'—';}

    totalUnits+=u;totalNGDV+=ngdv;totalGGDV+=ggdv;
    totalBumiAmt+=bumiAmt;totalSubsidy+=subsidy;totalCarpark+=carpark;totalGDC+=compGDC;
  });

  // Pillar subtotals per component (explicit items + CC allocated to this pillar)
  PILLARS.forEach(p=>{
    const pRow=document.getElementById('prow-'+pIdx+'-'+spIdx+'-'+p.code);
    let grandSub=0;
    compThs.forEach(th=>{
      const cid=th.dataset.cid;
      const tnfa=compNFA[cid]||0;
      let pSub=0;
      document.querySelectorAll('#cc-rows-'+pIdx+'-'+spIdx+' tr').forEach(row=>{
        if((row.querySelector('.cc-pillar')?.value||'')===p.code)
          pSub+=totalNFA>0?(+row.querySelector('.cc-amt')?.value||0)*(tnfa/totalNFA):0;
      });
      body.querySelectorAll('.item-row[data-pillar="'+p.code+'"]').forEach(row=>{
        pSub+=+(row.querySelector('td[data-cid="'+cid+'"] .i-budget')?.value)||0;
      });
      const existTd=pRow.querySelector('td[data-cid="'+cid+'"]');
      if(existTd){existTd.textContent=pSub>0?fmt(pSub):'—';}
      else{
        // insert pillar subtotal TDs if missing
        const addTh=document.getElementById('mtx-add-th-'+pIdx+'-'+spIdx);
        const addSpacerInRow=pRow.querySelector('.add-spacer');
        if(addSpacerInRow){
          const td=document.createElement('td');
          td.dataset.cid=cid;td.className='num';
          td.textContent=pSub>0?fmt(pSub):'—';
          pRow.insertBefore(td,addSpacerInRow);
        }
      }
      grandSub+=pSub;
    });
    // Pillar total col
    const tds=pRow.querySelectorAll('td');const last=tds[tds.length-1];
    if(last&&last.classList.contains('tcpd'))last.textContent=grandSub>0?fmt(grandSub):'—';
  });

  // Item row totals
  body.querySelectorAll('.item-row').forEach(row=>{
    let rowTotal=0;
    compThs.forEach(th=>{
      rowTotal+=+(row.querySelector('td[data-cid="'+th.dataset.cid+'"] .i-budget')?.value)||0;
    });
    const iTotalTd=row.querySelector('.i-total');
    if(iTotalTd)iTotalTd.textContent=rowTotal>0?fmt(rowTotal):'—';
  });

  // TOTAL column
  const lastTd=row=>{const tds=row.querySelectorAll('td');return tds[tds.length-1];};
  const setLast=(attr,cls,val)=>{
    const row=body.querySelector('[data-a="'+attr+'"]');if(!row)return;
    const td=lastTd(row);if(td){td.className=cls+' num';td.textContent=val;}
  };
  setLast('units','tcpd',totalUnits>0?totalUnits.toLocaleString():'—');
  setLast('tnfa','tcpd',totalNFA>0?totalNFA.toLocaleString():'—');
  setLast('asp','tcpd',totalNFA>0?(totalGGDV/totalNFA).toFixed(1)+' (wtd)':'—');
  setLast('ggdv','tcpd',totalGGDV>0?fmt(totalGGDV):'—');
  setLast('bumi_amt','tcpd',totalBumiAmt>0?'('+fmt(totalBumiAmt)+')':'—');
  setLast('subsidy','tcpd',totalSubsidy>0?'('+fmt(totalSubsidy)+')':'—');
  setLast('carpark','tcpd',totalCarpark>0?fmt(totalCarpark):'—');
  setLast('ngdv','tcpd',fmt(totalNGDV));
  const totalPBT=totalNGDV-totalGDC,totalMg=totalNGDV>0?totalPBT/totalNGDV:0;
  setLast('gdc_total','gdc-total',totalGDC>0?fmt(totalGDC):'—');
  setLast('pbt','pbt-total',fmt(totalPBT));
  setLast('margin','mg-total',totalNGDV>0?(totalMg*100).toFixed(1)+'%':'—');

  const kpiEl=document.querySelector('.sp-kpi-'+pIdx+'-'+spIdx);
  if(kpiEl)kpiEl.textContent=totalNGDV>0?fmtM(totalNGDV):'—';

  if(!computedSP[pIdx])computedSP[pIdx]={};
  computedSP[pIdx][spIdx]={netGDV:totalNGDV,totalGDC,pbt:totalPBT,margin:totalMg,totalNFA};
  cp(pIdx);
}

// ─── Compute phase ───
function cp(pIdx){
  const pc=document.getElementById('pc-'+pIdx);if(!pc)return;
  let tG=0,tC=0,tN=0;
  Object.values(computedSP[pIdx]||{}).forEach(d=>{tG+=d.netGDV||0;tC+=d.totalGDC||0;tN+=d.totalNFA||0;});
  const tP=tG-tC,tM=tG>0?tP/tG:0;
  pc.querySelector('.kpi-gdv').textContent=fmtM(tG);
  pc.querySelector('.kpi-gdc').textContent=fmtM(tC);
  pc.querySelector('.kpi-pbt').textContent=fmtM(tP);
  pc.querySelector('.kpi-margin').textContent=tG>0?(tM*100).toFixed(1)+'%':'—';
  computedP[pIdx]={netGDV:tG,totalGDC:tC,pbt:tP,margin:tM,totalNFA:tN};
  if(currentTab==='total')renderTotal();
}

function readMeta(){

    plot:document.getElementById('m-plot').value,
    loc:document.getElementById('m-loc').value,
    code:document.getElementById('m-code').value||'NCT-001',

    stage:document.getElementById('m-stage').value,
    scen:document.getElementById('m-scen').value,

function readSPData(pIdx,spIdx){
  const sp=document.getElementById('sp-'+pIdx+'-'+spIdx);if(!sp)return null;
  const hdrRow=document.getElementById('mtx-hdr-'+pIdx+'-'+spIdx);
  const body=document.getElementById('mtx-body-'+pIdx+'-'+spIdx);
  const spName=sp.querySelector('.sp-name')?.value||'Sub-phase '+(spIdx+1);
  let ccAmt=0;const ccItems=[];
  document.querySelectorAll('#cc-rows-'+pIdx+'-'+spIdx+' tr').forEach(row=>{
    const pillar=row.querySelector('.cc-pillar')?.value||'';
    const code=row.querySelector('.cc-code')?.value||'';
    const desc=row.querySelector('.cc-desc')?.value||'';
    const amt=+row.querySelector('.cc-amt')?.value||0;
    ccAmt+=amt;ccItems.push({pillar,code,desc,amt});
  });

  const compThs=Array.from(hdrRow.querySelectorAll('.comp-th'));
  const components=[];
  compThs.forEach(th=>{
    const cid=th.dataset.cid;
    const getTd=row=>row.querySelector('td[data-cid="'+cid+'"]');
    const name=th.querySelector('.c-name')?.value||'';
    const type=getTd(body.querySelector('[data-a="type"]'))?.querySelector('.c-type')?.value||'';
    const units=+(getTd(body.querySelector('[data-a="units"]'))?.querySelector('.c-units')?.value)||0;
    const nfa=+(getTd(body.querySelector('[data-a="nfa_u"]'))?.querySelector('.c-nfa')?.value)||0;
    const asp=+(getTd(body.querySelector('[data-a="asp"]'))?.querySelector('.c-asp')?.value)||0;
    const bumiPct=+(getTd(body.querySelector('[data-a="bumi_pct"]'))?.querySelector('.c-bumi')?.value)||0;
    const subsidy=+(getTd(body.querySelector('[data-a="subsidy"]'))?.querySelector('.c-subsidy')?.value)||0;
    const carpark=+(getTd(body.querySelector('[data-a="carpark"]'))?.querySelector('.c-carpark')?.value)||0;
    const costItems=[];
    PILLARS.forEach(p=>{
      body.querySelectorAll('.item-row[data-pillar="'+p.code+'"]').forEach(row=>{
        const budget=+(row.querySelector('td[data-cid="'+cid+'"] .i-budget')?.value)||0;
        const code=row.querySelector('.i-code')?.value||'';
        const desc=row.querySelector('.i-desc')?.value||'';
        costItems.push({pillar:p.code,code,desc,budget});
      });
    });
    components.push({cid,name,type,units,nfa,asp,bumiPct,subsidy,carpark,costItems});
  });
  return{spName,ccAmt,ccItems,components};
}

// ─── Export Report ───
function downloadReport(){
  if(!window.XLSX){alert('SheetJS not loaded.');return;}
  const meta=readMeta();const wb=XLSX.utils.book_new();
  const n=v=>typeof v==='number'?Math.round(v):v;
  const pct=v=>v?+(v).toFixed(1)+'%':'—';

  phases.forEach((ph,pIdx)=>{
    const rows=[];
    // Project header
    rows.push([meta.name+' ('+meta.code+')'],[meta.stage+' — '+meta.scen+'  |  '+meta.date],[meta.co+'  ·  '+meta.plot+'  ·  '+meta.loc],[]);

    for(let s=0;s<spCount[pIdx];s++){
      const sp=readSPData(pIdx,s);if(!sp)continue;
      const C=sp.components;const nc=C.length;
      const totalNFA=C.reduce((a,c)=>a+c.units*c.nfa,0);
      const ccByPillar={};
      (sp.ccItems||[]).forEach(cc=>{ccByPillar[cc.pillar]=(ccByPillar[cc.pillar]||0)+cc.amt;});

      // ── Sub-phase header ──
      rows.push(['◼ '+sp.spName,...Array(nc+1).fill('')]);

      // ── Common Cost section ──
      if((sp.ccItems||[]).length){
        rows.push(['COMMON COST',...Array(nc).fill(''),n(sp.ccAmt)]);
        rows.push(['Pillar','Code / Description',...C.map(()=>''),'Amount (RM)']);
        sp.ccItems.forEach(cc=>{
          rows.push([cc.pillar,cc.code+(cc.desc?' — '+cc.desc:''),...C.map(()=>''),n(cc.amt)]);
        });
        rows.push([]);
      }

      // ── Matrix header ──
      rows.push(['ATTRIBUTE','NOTE',...C.map(c=>c.name),'TOTAL']);
      rows.push(['',...['Type',...C.map(c=>c.type),'']]);

      // ── SALES ──
      rows.push(['▸  SALES',...Array(nc+1).fill('')]);
      rows.push(['Units','',                ...C.map(c=>c.units),                                      C.reduce((a,c)=>a+c.units,0)]);
      rows.push(['NFA / Unit','sqft',        ...C.map(c=>c.nfa),                                       '']);
      rows.push(['Total NFA','sqft',         ...C.map(c=>n(c.units*c.nfa)),                            n(totalNFA)]);
      rows.push(['ASP','RM psf',             ...C.map(c=>c.asp),                                       totalNFA>0?+(C.reduce((a,c)=>a+c.units*c.nfa*c.asp,0)/totalNFA).toFixed(1)+' (wtd)':'—']);
      const ggdvs=C.map(c=>c.units*c.nfa*c.asp);
      const totGGDV=ggdvs.reduce((a,v)=>a+v,0);
      rows.push(['Gross GDV','RM',           ...ggdvs.map(n),                                          n(totGGDV)]);
      rows.push(['Bumi Discount','%',         ...C.map(c=>c.bumiPct+'%'),                              '']);
      const bumiAmts=C.map((c,i)=>ggdvs[i]*c.bumiPct/100);
      const totBumi=bumiAmts.reduce((a,v)=>a+v,0);
      rows.push(['Bumi Amt','RM',            ...bumiAmts.map(v=>v?'('+n(v)+')':'—'),                  totBumi?'('+n(totBumi)+')':'—']);
      const subsidies=C.map(c=>c.subsidy);
      const totSub=subsidies.reduce((a,v)=>a+v,0);
      rows.push(['Cross-subsidy','RM',       ...subsidies.map(v=>v?'('+n(v)+')':'—'),                 totSub?'('+n(totSub)+')':'—']);
      const carparks=C.map(c=>c.carpark);
      const totCar=carparks.reduce((a,v)=>a+v,0);
      rows.push(['Carpark Revenue','RM',     ...carparks.map(v=>v||'—'),                               totCar||'—']);
      const ngdvs=C.map((c,i)=>ggdvs[i]-bumiAmts[i]-subsidies[i]+carparks[i]);
      const totNGDV=ngdvs.reduce((a,v)=>a+v,0);
      rows.push(['NET GDV','RM',             ...ngdvs.map(n),                                          n(totNGDV)]);
      rows.push([]);

      // ── COST ──
      rows.push(['▸  COST',...Array(nc+1).fill('')]);
      const compGDC=C.map(()=>0);

      PILLARS.forEach(p=>{
        // CC allocation for this pillar per component
        const ccP=ccByPillar[p.code]||0;
        const ccAllocs=C.map(c=>totalNFA>0?ccP*(c.units*c.nfa/totalNFA):0);

        // Explicit items — same rows shared across components
        // Use first component's items as the template (codes/descs are shared)
        const pillarItemsRef=C[0]?.costItems.filter(i=>i.pillar===p.code)||[];

        // Pillar subtotals per component
        const pillarSubs=C.map((c,ci)=>{
          const expl=c.costItems.filter(i=>i.pillar===p.code).reduce((a,i)=>a+i.budget,0);
          return expl+ccAllocs[ci];
        });
        const totPillar=pillarSubs.reduce((a,v)=>a+v,0);
        pillarSubs.forEach((v,i)=>compGDC[i]+=v);

        rows.push([p.code+' — '+p.name,'',...pillarSubs.map(v=>v?n(v):'—'),totPillar?n(totPillar):'—']);

        // CC items for this pillar
        (sp.ccItems||[]).filter(cc=>cc.pillar===p.code).forEach(cc=>{
          rows.push(['  [CC] '+cc.code,cc.desc,...ccAllocs.map(v=>v?n(v):'—'),n(cc.amt)]);
        });

        // Explicit line items
        pillarItemsRef.forEach((item,idx)=>{
          const budgets=C.map(c=>c.costItems.filter(i=>i.pillar===p.code)[idx]?.budget||'');
          const rowTotal=budgets.reduce((a,v)=>a+(+v||0),0);
          rows.push(['  '+item.code,item.desc,...budgets.map(v=>v||'—'),rowTotal?n(rowTotal):'—']);
        });
      });

      rows.push([]);
      const totGDC=compGDC.reduce((a,v)=>a+v,0);
      rows.push(['TOTAL GDC','RM',...compGDC.map(n),n(totGDC)]);
      const pbts=ngdvs.map((v,i)=>v-compGDC[i]);
      const totPBT=totNGDV-totGDC;
      rows.push(['PBT','RM',...pbts.map(n),n(totPBT)]);
      rows.push(['Margin','%',...ngdvs.map((v,i)=>pct(v>0?pbts[i]/v*100:null)),pct(totNGDV>0?totPBT/totNGDV*100:null)]);
      rows.push([],[]);
    }

    const maxNC=Math.max(1,...Array.from({length:spCount[pIdx]},(_,s)=>{const d=readSPData(pIdx,s);return d?d.components.length:0;}));
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:28},{wch:24},...Array(maxNC).fill({wch:18}),{wch:18}];
    XLSX.utils.book_append_sheet(wb,ws,ph.name.substring(0,31));
  });

  // Summary sheet
  const sr=[[meta.name+' ('+meta.code+')'],[meta.stage+' | '+meta.scen],[]];
  sr.push(['Phase','Net GDV (RM)','Total GDC (RM)','PBT (RM)','Margin (%)']);
  phases.forEach((p,i)=>{
    const d=computedP[i]||{};
    sr.push([p.name,n(d.netGDV||0),n(d.totalGDC||0),n(d.pbt||0),d.netGDV>0?+((d.margin||0)*100).toFixed(1):'']);
  });
  const sw=XLSX.utils.aoa_to_sheet(sr);
  sw['!cols']=[{wch:24},{wch:18},{wch:18},{wch:18},{wch:12}];
  XLSX.utils.book_append_sheet(wb,sw,'Summary');
  XLSX.writeFile(wb,(meta.code||'NCT')+'_'+meta.stage+'_Report.xlsx');
}

  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(phRows),'tbl_PHASE');
  const salesRows=[['l3_phase_code','l4_subphase','l5_component','product_type','units','nfa_per_unit','asp_psf','bumi_pct','cross_subsidy_amt','carpark_revenue','gross_gdv','net_gdv','stage']];
  const costRows=[['l3_phase_code','l4_subphase','l5_component','pillar_code','item_code','item_description','budget_amt','stage']];
  phases.forEach((ph,pIdx)=>{
    for(let s=0;s<spCount[pIdx];s++){
      const sp=readSPData(pIdx,s);if(!sp)continue;
      const pc='P'+(pIdx+1);
      const totalNFA=sp.components.reduce((s,c)=>s+c.units*c.nfa,0);
      sp.components.forEach(c=>{
        const ggdv=c.units*c.nfa*c.asp;
        const ngdv=ggdv-ggdv*c.bumiPct/100-c.subsidy+c.carpark;
        salesRows.push([pc,sp.spName,c.name,c.type,c.units,c.nfa,c.asp,c.bumiPct,c.subsidy,c.carpark,ggdv,ngdv,meta.stage]);
        // Common cost as COMMON pillar row
        const compNFA2=c.units*c.nfa;
        (sp.ccItems||[]).forEach(cc=>{
          const alloc=totalNFA>0?cc.amt*(compNFA2/totalNFA):0;
          if(alloc>0)costRows.push([pc,sp.spName,c.name,cc.pillar||'COMMON',cc.code,cc.desc+' (alloc)',alloc,meta.stage]);
        });
        c.costItems.forEach(i=>{if(i.budget>0)costRows.push([pc,sp.spName,c.name,i.pillar,i.code,i.desc,i.budget,meta.stage]);});
      });
      // Hierarchy row
    }
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(salesRows),'tbl_SALES');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(costRows),'tbl_COST');
  XLSX.writeFile(wb,(meta.code||'NCT')+'_'+meta.stage+'_Pipeline.xlsx');
}

async function getAccessToken(){
  await msalReady();
  let accs=msalApp.getAllAccounts();
  if(!accs.length){
    await msalApp.loginPopup({scopes:FABRIC_SCOPES});
    updateAuthUI();
    accs=msalApp.getAllAccounts();
  }
  const req={scopes:FABRIC_SCOPES,account:accs[0]};
  try{const r=await msalApp.acquireTokenSilent(req);return r.accessToken;}
  catch(e){
    if(e instanceof msal.InteractionRequiredAuthError){const r=await msalApp.acquireTokenPopup(req);return r.accessToken;}
    throw e;
  }
}

async function gqlFetch(query,variables={}){
  const token=await getAccessToken();
  const res=await fetch(GRAPHQL_ENDPOINT,{
    method:'POST',
    headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({query,variables}),
  });
  if(!res.ok){const t=await res.text();throw new Error(`GQL ${res.status}: ${t}`);}
  const json=await res.json();
  if(json.errors?.length)throw new Error(json.errors.map(e=>e.message).join('; '));
  return json.data;
}

async function gqlInsertMany(mutation,inputType,rows){
  if(!rows.length)return;
  const CHUNK=20;
  for(let off=0;off<rows.length;off+=CHUNK){
    const chunk=rows.slice(off,off+CHUNK);
    const vars={};
    const defs=chunk.map((_,j)=>`$v${j}:${inputType}!`).join(',');
    const ops=chunk.map((row,j)=>{vars[`v${j}`]=row;return `r${j}:${mutation}(item:$v${j}){result{__typename}}`;}).join(' ');
    await gqlFetch(`mutation(${defs}){${ops}}`,vars);
  }
}

  phases.forEach((ph,pIdx)=>{
    for(let spIdx=0;spIdx<spCount[pIdx];spIdx++){
      const sp=readSPData(pIdx,spIdx);if(!sp)continue;
      hierarchyRows.push({
        l1_company:meta.co,l2_plot_code:meta.plot,l2_plot_name:meta.loc,
        l3_phase:ph.name,l4_subphase:sp.spName,
        l3_sort_order:pIdx,l4_sort_order:spIdx,
      });
      (sp.ccItems||[]).forEach((item,iSort)=>{
        if(item.amt>0||item.code)costRows.push({
          l3_phase:ph.name,l4_subphase:sp.spName,l5_component:'',
          pillar_code:item.pillar||'COMMON',item_code:item.code||'',
          item_description:item.desc||'',budget_amt:item.amt||0,sort_order:iSort,
        });
      });
      sp.components.forEach((c,cSort)=>{
        salesRows.push({
          l3_phase:ph.name,l4_subphase:sp.spName,l5_component:c.name,
          product_type:c.type,units:c.units,nfa_per_unit:c.nfa,asp_psf:c.asp,
          bumi_pct:c.bumiPct,cross_subsidy_amt:c.subsidy,carpark_revenue:c.carpark,
          sort_order:cSort,
        });
        c.costItems.forEach((item,iSort)=>{
          if(item.budget>0||item.code)costRows.push({
            l3_phase:ph.name,l4_subphase:sp.spName,l5_component:c.name,
            pillar_code:item.pillar,item_code:item.code||'',
            item_description:item.desc||'',budget_amt:item.budget||0,sort_order:iSort,
          });
        });
      });
    }
  });
  return{
    snapshot:{
      project_name:meta.name||'Untitled',project_code:meta.code,stage:meta.stage,
      scenario:meta.scen,status:meta.stat,version_date:meta.date||null,
      wacc:parseFloat(meta.wacc)||null,
    },
    hierarchyRows,salesRows,costRows,
  };
}

async function saveSnapshot(){
  const saveBtn=[...document.querySelectorAll('.btn.ghost')].find(b=>b.textContent.includes('Save'));
  const orig=saveBtn?.textContent;
  if(saveBtn)saveBtn.textContent='Saving…';
  try{
    const p=buildSavePayload();const s=p.snapshot;
    const sid=crypto.randomUUID();
    await gqlFetch(`mutation($item:snapshotsCreateInput!){createSnapshots(item:$item){result{id}}}`,
      {item:{id:sid,project_name:s.project_name||null,project_code:s.project_code||null,
        stage:s.stage||null,scenario:s.scenario||null,status:s.status||null,
        version_date:s.version_date||null,wacc:s.wacc??null,
        created_at:new Date().toISOString()}});
    await gqlInsertMany('createHierarchy','hierarchyCreateInput',p.hierarchyRows.map(r=>({
      snapshot_id:sid,l1_company:r.l1_company||null,l2_plot_code:r.l2_plot_code||null,
      l2_plot_name:r.l2_plot_name||null,l3_phase:r.l3_phase||null,l4_subphase:r.l4_subphase||null,
      l3_sort_order:r.l3_sort_order,l4_sort_order:r.l4_sort_order})));
    await gqlInsertMany('createSales','salesCreateInput',p.salesRows.map(r=>({
      snapshot_id:sid,l3_phase:r.l3_phase||null,l4_subphase:r.l4_subphase||null,
      l5_component:r.l5_component||null,product_type:r.product_type||null,
      units:r.units||null,nfa_per_unit:r.nfa_per_unit||null,asp_psf:r.asp_psf||null,
      bumi_pct:r.bumi_pct||null,cross_subsidy_amt:r.cross_subsidy_amt||null,
      carpark_revenue:r.carpark_revenue||null,sort_order:r.sort_order??0})));
    await gqlInsertMany('createCost1','cost1CreateInput',p.costRows.map((r,i)=>({
      snapshot_id:sid,l3_phase:r.l3_phase||null,l4_subphase:r.l4_subphase||null,
      l5_component:r.l5_component||null,pillar_code:r.pillar_code||null,
      item_code:r.item_code||null,item_description:r.item_description||null,
      budget_amt:r.budget_amt||null,sort_order:r.sort_order??i})));
    if(saveBtn)saveBtn.textContent='✓ Saved';
    setTimeout(()=>{if(saveBtn)saveBtn.textContent=orig;},2000);
  }catch(e){alert('Save failed: '+e.message);if(saveBtn)saveBtn.textContent=orig;}
}

async function openLoad(){
  const list=document.getElementById('modal-list');
  list.innerHTML='<div class="modal-empty">Loading…</div>';
  document.getElementById('load-modal').classList.add('open');
  try{
    const data=await gqlFetch(`query{snapshots(orderBy:{created_at:DESC}){items{id project_name project_code stage status version_date created_at}}}`);
    const snaps=data.snapshots?.items||[];
    if(!snaps.length){list.innerHTML='<div class="modal-empty">No saved feasibilities yet.</div>';return;}
    list.innerHTML=snaps.map(s=>`
      <div class="modal-row" onclick="loadSnapshot('${s.id}')">
        <span class="modal-name">${s.project_name||'Untitled'}</span>
        <span class="modal-stage">${s.stage||'BD'}</span>
        <span class="modal-date">${(s.version_date||'').substring(0,10)||'—'}</span>
      </div>`).join('');
  }catch(e){list.innerHTML='<div class="modal-empty">Error: '+e.message+'</div>';}
}

function closeLoad(){document.getElementById('load-modal').classList.remove('open');}

async function loadSnapshot(id){
  closeLoad();
  if(!confirm('Load this feasibility? Current data will be replaced.'))return;
  try{
    const [sData,hData,salData,cData]=await Promise.all([
      gqlFetch(`query($id:String!){snapshots(filter:{id:{eq:$id}}){items{id project_name project_code stage scenario status version_date wacc}}}`,{id}),
      gqlFetch(`query($id:String!){hierarchy(filter:{snapshot_id:{eq:$id}},orderBy:{l3_sort_order:ASC}){items{l1_company l2_plot_code l2_plot_name l3_phase l4_subphase l3_sort_order l4_sort_order}}}`,{id}),
      gqlFetch(`query($id:String!){sales(filter:{snapshot_id:{eq:$id}},orderBy:{sort_order:ASC}){items{l3_phase l4_subphase l5_component product_type units nfa_per_unit asp_psf bumi_pct cross_subsidy_amt carpark_revenue sort_order}}}`,{id}),
      gqlFetch(`query($id:String!){cost1(filter:{snapshot_id:{eq:$id}},orderBy:{sort_order:ASC}){items{l3_phase l4_subphase l5_component pillar_code item_code item_description budget_amt sort_order}}}`,{id}),
    ]);
    restoreFromSupabase(
      sData.snapshots?.items?.[0],
      hData.hierarchy?.items||[],
      salData.sales?.items||[],
      cData.cost1?.items||[]
    );
  }catch(e){alert('Load failed: '+e.message);}
}

function resetDOM(){
  phases=[];spCount={};compCount={};computedSP={};computedP={};
  document.getElementById('phase-tabs').innerHTML='';
  document.getElementById('phase-contents').innerHTML='';
  const d=document.createElement('div');
  d.id='pc-total';d.className='pc';d.style.padding='20px';
  d.innerHTML='<p style="color:#aaa;padding:40px;text-align:center">Add phases and enter data to see the consolidated total.</p>';
  document.getElementById('phase-contents').appendChild(d);
}

function clearPillarItems(pIdx,spIdx,pCode){
  document.getElementById('mtx-body-'+pIdx+'-'+spIdx)
    ?.querySelectorAll('.item-row[data-pillar="'+pCode+'"]').forEach(r=>r.remove());
}

function restoreFromSupabase(snap,hierarchy,sales,costs){
  // Meta
  document.getElementById('m-co').value=hierarchy[0]?.l1_company||'';
  document.getElementById('m-plot').value=hierarchy[0]?.l2_plot_code||'';
  document.getElementById('m-loc').value=hierarchy[0]?.l2_plot_name||'';
  document.getElementById('m-code').value=snap.project_code||'';
  document.getElementById('m-name').value=snap.project_name||'';
  document.getElementById('m-stage').value=snap.stage||'BD';
  document.getElementById('m-scen').value=snap.scenario||'Base';
  document.getElementById('m-stat').value=snap.status||'Draft';
  document.getElementById('m-date').value=snap.version_date||'';
  document.getElementById('m-wacc').value=snap.wacc||'8.0';
  resetDOM();

  // Distinct phases in order
  const phaseNames=[...new Map(hierarchy.map(r=>[r.l3_phase,r.l3_sort_order])).entries()]
    .sort((a,b)=>a[1]-b[1]).map(([n])=>n);

  phaseNames.forEach(phaseName=>{
    addPhase(phaseName);
    const pIdx=phases.length-1;
    document.getElementById('sp-list-'+pIdx).innerHTML='';
    spCount[pIdx]=0;

    hierarchy.filter(r=>r.l3_phase===phaseName).forEach(spRow=>{
      const spName=spRow.l4_subphase;
      addSubphase(pIdx,spName);
      const spIdx=spCount[pIdx]-1;
      const spEl=document.getElementById('sp-'+pIdx+'-'+spIdx);
      const body=document.getElementById('mtx-body-'+pIdx+'-'+spIdx);
      const hdrRow=document.getElementById('mtx-hdr-'+pIdx+'-'+spIdx);

      // Common cost items (l5_component = '')
      const ccRows=costs.filter(c=>c.l3_phase===phaseName&&c.l4_subphase===spName&&c.l5_component==='');
      if(ccRows.length){
        const ccBody=document.getElementById('cc-body-'+pIdx+'-'+spIdx);
        const ccChev=document.getElementById('cc-chev-'+pIdx+'-'+spIdx);
        if(ccBody){ccBody.style.display='';if(ccChev)ccChev.textContent='▼';}
        ccRows.forEach(r=>addCCItem(pIdx,spIdx,r.pillar_code,r.item_code,r.item_description,r.budget_amt));
      }

      // Remove default component from addSubphase
      hdrRow.querySelectorAll('.comp-th').forEach(th=>{
        const cid=th.dataset.cid;th.remove();
        body.querySelectorAll('td[data-cid="'+cid+'"]').forEach(td=>td.remove());
      });
      compCount[pIdx][spIdx]=0;

      // Add components from sales table
      const comps=sales.filter(s=>s.l3_phase===phaseName&&s.l4_subphase===spName);
      comps.forEach(comp=>{
        addComponent(pIdx,spIdx);
        const cIdx=compCount[pIdx][spIdx]-1;
        hdrRow.querySelector('.comp-th[data-cid="'+cIdx+'"]')?.querySelector('.c-name')&&
          (hdrRow.querySelector('.comp-th[data-cid="'+cIdx+'"]').querySelector('.c-name').value=comp.l5_component||'');
        const getTd=a=>{const r=body.querySelector('[data-a="'+a+'"]');return r?r.querySelector('td[data-cid="'+cIdx+'"]'):null;};
        const si=(a,sel,v)=>{const td=getTd(a);if(td){const el=td.querySelector(sel);if(el&&v!=null)el.value=v;}};
        si('type','.c-type',comp.product_type);
        si('units','.c-units',comp.units);
        si('nfa_u','.c-nfa',comp.nfa_per_unit);
        si('asp','.c-asp',comp.asp_psf);
        si('bumi_pct','.c-bumi',comp.bumi_pct);
        si('subsidy','.c-subsidy',comp.cross_subsidy_amt);
        si('carpark','.c-carpark',comp.carpark_revenue);
      });

      // Restore pillar items (shared rows across all components)
      PILLARS.forEach(p=>{
        clearPillarItems(pIdx,spIdx,p.code);
        const pillarCosts=costs.filter(c=>c.l3_phase===phaseName&&c.l4_subphase===spName&&c.l5_component!==''&&c.pillar_code===p.code);
        // Unique items ordered by sort_order
        const seen=new Set();const uniqueItems=[];
        [...pillarCosts].sort((a,b)=>a.sort_order-b.sort_order).forEach(c=>{
          const key=(c.item_code||'')+'||'+(c.item_description||'');
          if(!seen.has(key)){seen.add(key);uniqueItems.push({code:c.item_code||'',desc:c.item_description||''});}
        });
        uniqueItems.forEach(item=>{
          addPillarItem(pIdx,spIdx,p.code,p.prefix);
          const rows=body.querySelectorAll('.item-row[data-pillar="'+p.code+'"]');
          const row=rows[rows.length-1];if(!row)return;
          const ci=row.querySelector('.i-code');if(ci)ci.value=item.code;
          const di=row.querySelector('.i-desc');if(di)di.value=item.desc;
          comps.forEach((comp,cIdx)=>{
            const match=pillarCosts.find(c=>c.l5_component===comp.l5_component&&c.item_code===item.code);
            const bi=row.querySelector('td[data-cid="'+cIdx+'"] .i-budget');
            if(bi&&match)bi.value=match.budget_amt||0;
          });
        });
      });

      csp(pIdx,spIdx);
    });
    switchTab(pIdx);
  });
  updateBreadcrumb();
}

// ─── Init ───
const totalDiv=document.createElement('div');
totalDiv.id='pc-total';totalDiv.className='pc';totalDiv.style.padding='20px';
totalDiv.innerHTML='<p style="color:#aaa;padding:40px;text-align:center">Add phases and enter data to see the consolidated total.</p>';
document.getElementById('phase-contents').appendChild(totalDiv);
addPhase('Phase 1');

// MSAL: check sign-in state on load
msalReady().then(()=>updateAuthUI());
</script>
